<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetUs - 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body class="dashboard-page">
    <main class="app-shell">
      <aside class="sidebar"></aside>

      <section class="content-shell dashboard-shell">
        <header class="topbar">
          <div class="page-title">
            <p class="eyebrow">Dashboard</p>
            <h2>대시보드</h2>
            <p>현재 처리 현황과 최근 완료된 회의를 한눈에 확인합니다.</p>
          </div>
          <div class="topbar-actions">
            <span id="current-workspace" class="muted"></span>
            <span id="current-user" class="muted"></span>
          </div>
        </header>

        <section id="metrics-grid" class="metrics-grid"></section>

        <section class="grid-two dashboard-lists-grid">
          <article class="card dashboard-scroll-card">
            <div class="card-head">
              <div>
                <p class="eyebrow">최근 회의</p>
                <h3>최신 활동</h3>
              </div>
            </div>
            <div id="recent-meetings" class="meeting-list dashboard-scroll-content"></div>
          </article>

          <article class="card dashboard-scroll-card">
            <div class="card-head">
              <div>
                <p class="eyebrow">Workspace Members</p>
                <h3>멤버 목록</h3>
              </div>
            </div>
            <div id="workspace-members" class="meeting-list dashboard-scroll-content"></div>
          </article>
        </section>
      </section>
    </main>

    <script src="./sidebar.js"></script>
    <script src="./mobile-nav.js"></script>
    <script src="./runtime-config.js"></script>
    <script type="module" src="./pages/dashboardOverview.js"></script>
  </body>
</html>
