<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Minutes - Meeting Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <header class="mobile-topbar">
      <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="메뉴 열기" aria-expanded="false">☰</button>
      <strong>AI Minutes</strong>
    </header>
    <div id="mobile-overlay" class="mobile-overlay" aria-hidden="true"></div>

    <main class="workspace detail">
      <aside class="sidebar">
        <h1>AI Minutes</h1>
        <p class="muted">Meeting Detail</p>
        <a class="btn" href="./index.html">대시보드</a>
      </aside>

      <section class="panel main-panel">
        <div class="panel-head">
          <h2 id="meeting-title">회의 상세</h2>
          <span id="meeting-meta" class="muted"></span>
        </div>
        <article class="summary-card">
          <h3>요약</h3>
          <div id="summary-content" class="summary"></div>
        </article>
      </section>

      <section class="panel left-panel">
        <h2>담당자별 To-Do</h2>
        <div id="todo-root" class="todo-list"></div>
      </section>
    </main>

    <script type="module" src="./pages/meetingDetail.js"></script>
  </body>
</html>
