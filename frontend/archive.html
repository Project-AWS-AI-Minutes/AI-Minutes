<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetUs - Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <h1>MeetUs</h1>
          <p>AI Meeting Summary &amp; To-Do Archive Platform</p>
        </div>
        <nav class="nav-group">
          <a class="nav-item" href="./dashboard.html">Dashboard</a>
          <a class="nav-item" href="./upload.html">Upload Meeting</a>
          <a class="nav-item" href="./index.html">Meetings</a>
          <a class="nav-item active" href="./archive.html">Archive</a>
        </nav>
        <div class="sidebar-card">
          <h3>Archive View</h3>
          <p>완료되었거나 실패한 회의를 중심으로 검색, 날짜 필터, 최신순 정렬을 제공합니다.</p>
        </div>
      </aside>

      <section class="content-shell">
        <header class="topbar">
          <div class="page-title">
            <p class="eyebrow">Archive</p>
            <h2>Meeting Archive</h2>
            <p>처리 완료된 회의를 보관하고 빠르게 다시 찾을 수 있습니다.</p>
          </div>
        </header>

        <section class="card">
          <div class="filters">
            <div class="field">
              <label for="search-input">Search meeting</label>
              <input id="search-input" type="search" placeholder="회의 제목 또는 참여자 검색" />
            </div>
            <div class="field">
              <label for="date-filter">Filter by date</label>
              <input id="date-filter" type="date" />
            </div>
            <div class="field">
              <label for="sort-filter">Sort by latest</label>
              <select id="sort-filter">
                <option value="date-desc">Latest first</option>
                <option value="date-asc">Oldest first</option>
              </select>
            </div>
          </div>
        </section>

        <section id="archive-list" class="meeting-list"></section>
        <p id="empty-state" class="empty-state hidden">Archive에 표시할 회의가 없습니다.</p>
      </section>
    </main>

    <script type="module" src="./pages/archivePage.js"></script>
  </body>
</html>
