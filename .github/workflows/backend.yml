name: backend-ci-cd

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ai-minutes-core-api
  ECS_CLUSTER: ai-minutes-cluster
  ECS_SERVICE: ai-minutes-core-api-service
  ECS_TASK_DEFINITION_TEMPLATE: backend/deploy/taskdef-core-api.template.json
  IMAGE_TAG: ${{ github.sha }}

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TA_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            ./backend

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Summary
        run: |
          echo "Pushed image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

      - name: Register ECS task definition
        id: register-task-def
        shell: pwsh
        run: |
          $imageUri = "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          $taskDefPath = "${{ env.ECS_TASK_DEFINITION_TEMPLATE }}"
          $renderedTaskDefPath = Join-Path $env:RUNNER_TEMP "taskdef-rendered.json"

          Get-Content $taskDefPath -Raw `
            | ConvertFrom-Json `
            | ForEach-Object {
                $_.containerDefinitions[0].image = $imageUri
                $_
              } `
            | ConvertTo-Json -Depth 100 `
            | Set-Content $renderedTaskDefPath

          $taskDefArn = aws ecs register-task-definition `
            --cli-input-json file://$renderedTaskDefPath `
            --region "${{ env.AWS_REGION }}" `
            --query "taskDefinition.taskDefinitionArn" `
            --output text

          "task_definition_arn=$taskDefArn" >> $env:GITHUB_OUTPUT

      - name: Deploy updated task definition
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.register-task-def.outputs.task_definition_arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
